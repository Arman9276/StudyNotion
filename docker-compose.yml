services:

  mongodb:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"
    env_file:
      - .env
    volumes:
      - mongo-data:/data/db
    networks:
      - studynotion-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo-express:
    image: mongo-express
    container_name: mongo-express
    ports:
      - "8081:8081"
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - studynotion-network

  backend:
    image: ${DOCKER_USERNAME}/studynotion-backend:latest
    container_name: backend
    env_file:
      - server/.env
    ports:
      - "4000:4000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - studynotion-network

  frontend:
    image: ${DOCKER_USERNAME}/studynotion-frontend:latest
    container_name: frontend
    ports:
      - "8082:80"
    depends_on:
      - backend
    networks:
      - studynotion-network

volumes:
  mongo-data:

networks:
  studynotion-network:
    driver: bridge
